<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spotify - Listen to music, podcasts, and more.">
  <title>Spotify — Music for everyone</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='12' fill='%231DB954'/><path d='M16.5 15.5c-.2 0-.3-.1-.5-.2-2-1.2-4.5-1.5-7.4-.8-.2.1-.5-.1-.5-.3-.1-.2.1-.5.3-.5 3.2-.7 5.9-.4 8.1.9.2.1.3.4.1.6-.1.2-.1.3-.1.3zm1.3-2.5c-.2 0-.4-.1-.5-.2-2.3-1.4-5.8-1.8-8.5-1-.3.1-.5-.1-.6-.3-.1-.3.1-.5.3-.6 3.1-.9 6.9-.5 9.5 1.1.2.1.3.4.2.7-.2.2-.3.3-.4.3zm.1-2.6C14.8 8.7 9 8.5 5.7 9.5c-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7C9 7.2 15.3 7.4 18.8 9.4c.3.2.4.5.2.8-.1.2-.4.3-.6.2z' fill='white'/></svg>">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="#1db954"><circle cx="12" cy="12" r="12"/><path d="M16.5 15.5c-.2 0-.3-.1-.5-.2-2-1.2-4.5-1.5-7.4-.8-.2.1-.5-.1-.5-.3-.1-.2.1-.5.3-.5 3.2-.7 5.9-.4 8.1.9.2.1.3.4.1.6-.1.2-.1.3-.1.3zm1.3-2.5c-.2 0-.4-.1-.5-.2-2.3-1.4-5.8-1.8-8.5-1-.3.1-.5-.1-.6-.3-.1-.3.1-.5.3-.6 3.1-.9 6.9-.5 9.5 1.1.2.1.3.4.2.7-.2.2-.3.3-.4.3zm.1-2.6C14.8 8.7 9 8.5 5.7 9.5c-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7C9 7.2 15.3 7.4 18.8 9.4c.3.2.4.5.2.8-.1.2-.4.3-.6.2z" fill="white"/></svg>
        <span>Spotify</span>
      </div>

      <nav class="sidebar-nav">
        <a class="sidebar-nav-item active" id="nav-home">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L3 10.5V21h6v-6h6v6h6V10.5L12 3z"/></svg>
          Home
        </a>
        <a class="sidebar-nav-item" id="nav-search">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.5 3a7.5 7.5 0 015.645 12.438l4.709 4.708a1 1 0 01-1.415 1.415l-4.708-4.71A7.5 7.5 0 1110.5 3zm0 2a5.5 5.5 0 100 11 5.5 5.5 0 000-11z"/></svg>
          Search
        </a>
      </nav>

      <div class="sidebar-library">
        <div class="library-header">
          <div class="library-header-left">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 22a1 1 0 01-1-1V3a1 1 0 012 0v18a1 1 0 01-1 1zM15.5 2.134A1 1 0 0117 3v18a1 1 0 01-1.5.866l-8-4.5a1 1 0 010-1.732l8-4.5zM15 5.232l-5.5 3.098v7.34L15 18.768V5.232z"/><path d="M21 2a1 1 0 011 1v18a1 1 0 11-2 0V3a1 1 0 011-1z"/></svg>
            Your Library
          </div>
          <button id="btn-add-library" title="Create playlist">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M15.25 8a.75.75 0 01-.75.75H8.75v5.75a.75.75 0 01-1.5 0V8.75H1.5a.75.75 0 010-1.5h5.75V1.5a.75.75 0 011.5 0v5.75h5.75a.75.75 0 01.75.75z"/></svg>
          </button>
        </div>
        <div class="library-chips">
          <button class="library-chip active">Playlists</button>
          <button class="library-chip">Artists</button>
          <button class="library-chip">Albums</button>
        </div>
        <div class="library-list" id="library-list"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div class="main-gradient" id="main-gradient"></div>
      <div class="topbar" id="topbar">
        <div class="topbar-nav">
          <button id="btn-back" disabled><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.03 3.97a.75.75 0 010 1.06L7.56 8.5l3.47 3.47a.75.75 0 11-1.06 1.06l-4-4a.75.75 0 010-1.06l4-4a.75.75 0 011.06 0z"/></svg></button>
          <button id="btn-forward" disabled><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4.97 3.97a.75.75 0 011.06 0l4 4a.75.75 0 010 1.06l-4 4a.75.75 0 01-1.06-1.06L8.44 8.5 4.97 5.03a.75.75 0 010-1.06z"/></svg></button>
        </div>
        <div class="topbar-user">
          <button class="topbar-user-btn" id="btn-user" title="User profile">A</button>
        </div>
      </div>

      <!-- Greeting -->
      <section class="greeting-section fade-in" id="greeting-section">
        <h1 id="greeting-text">Good Evening</h1>
        <div class="greeting-grid" id="greeting-grid"></div>
      </section>

      <!-- Featured Songs -->
      <section class="content-section fade-in" id="featured-section">
        <div class="section-header">
          <h2>Made For You</h2>
          <a href="#">Show all</a>
        </div>
        <div class="card-row" id="card-row"></div>
      </section>

      <!-- Track List -->
      <section class="content-section fade-in">
        <div class="section-header">
          <h2>Popular Tracks</h2>
        </div>
      </section>
      <div class="tracklist" id="tracklist">
        <div class="tracklist-header">
          <span>#</span>
          <span>Title</span>
          <span>Album</span>
          <span style="text-align:right">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8z"/><path d="M8 3.25a.75.75 0 01.75.75v3.69l2.28 2.28a.75.75 0 01-1.06 1.06l-2.5-2.5A.75.75 0 017.25 8V4A.75.75 0 018 3.25z"/></svg>
          </span>
        </div>
        <div id="track-list-body"></div>
      </div>
    </main>

    <!-- Player Bar -->
    <footer class="player-bar" id="player-bar">
      <div class="player-left">
        <img id="player-img" src="assets/album_working.png" alt="Now playing">
        <div class="player-track-info">
          <div class="player-track-name" id="player-track-name">Working</div>
          <div class="player-track-artist" id="player-track-artist">Cory Barker feat. Jordan King</div>
        </div>
        <button class="player-like" id="btn-like" title="Save to Your Library">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.69 2A4.582 4.582 0 018 2.023 4.583 4.583 0 0114.31 2a4.583 4.583 0 010 6.486L8 14.25 1.69 8.486A4.583 4.583 0 011.69 2z"/></svg>
        </button>
      </div>

      <div class="player-center">
        <div class="player-controls">
          <button id="btn-shuffle" title="Shuffle"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.151.922a.75.75 0 10-1.06 1.06L13.109 3H11.16a3.75 3.75 0 00-2.873 1.34l-6.173 7.356A2.25 2.25 0 01.39 12.5H0V14h.391a3.75 3.75 0 002.873-1.34l6.173-7.356A2.25 2.25 0 0111.16 4.5h1.95l-1.018 1.018a.75.75 0 001.06 1.06l2.06-2.06a.75.75 0 000-1.061l-2.06-2.535zM0 3.5A.75.75 0 01.75 2.75h.641a3.75 3.75 0 012.873 1.34l1.5 1.787-.796.948-1.5-1.787A2.25 2.25 0 001.39 4.5H.75A.75.75 0 010 3.75v-.25zm13.109 9.5h-1.95a2.25 2.25 0 01-1.723-.804l-1.5-1.787-.796.948 1.5 1.787A3.75 3.75 0 0011.16 14.5h1.95l-1.018 1.018a.75.75 0 001.06 1.06l2.06-2.06a.75.75 0 000-1.06l-2.06-2.06a.75.75 0 00-1.06 1.06l1.017 1.042z"/></svg></button>
          <button id="btn-prev" title="Previous"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.3 1a.7.7 0 01.7.7v5.15l9.95-5.744a.7.7 0 011.05.606v12.575a.7.7 0 01-1.05.607L4 9.15v5.15a.7.7 0 01-1.4 0V1.7a.7.7 0 01.7-.7z"/></svg></button>
          <button class="btn-play-main" id="btn-play" title="Play"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" id="play-icon"><path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"/></svg></button>
          <button id="btn-next" title="Next"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M12.7 1a.7.7 0 01.7.7v5.15l-9.95-5.744a.7.7 0 00-1.05.606v12.575a.7.7 0 001.05.607L12.4 9.15v5.15a.7.7 0 001.4 0V1.7a.7.7 0 00-.7-.7h-.4z"/></svg></button>
          <button id="btn-repeat" title="Repeat"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 4.75A3.75 3.75 0 013.75 1h8.5A3.75 3.75 0 0116 4.75v5a.75.75 0 01-1.5 0v-5A2.25 2.25 0 0012.25 2.5h-8.5A2.25 2.25 0 001.5 4.75v5A2.25 2.25 0 003.75 12H5v1.5H3.75A3.75 3.75 0 010 9.75v-5zM12.25 16a.75.75 0 01-.75-.75V9.967l-1.955 1.955a.75.75 0 01-1.06-1.06l3.236-3.236a.75.75 0 011.06 0l3.236 3.236a.75.75 0 11-1.06 1.06L13 9.967v5.283a.75.75 0 01-.75.75z"/></svg></button>
        </div>
        <div class="player-progress">
          <span id="time-current">0:00</span>
          <div class="progress-bar-container" id="progress-bar">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%">
              <div class="progress-bar-thumb"></div>
            </div>
          </div>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <div class="player-right">
        <button id="btn-queue" title="Queue"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M15 15H1v-1.5h14V15zm0-4.5H1V9h14v1.5zm-14-7A2.5 2.5 0 013.5 1h9A2.5 2.5 0 0115 3.5v.038a2.5 2.5 0 01-2.5 2.462h-9A2.5 2.5 0 011 3.538V3.5zm2.5-1a1 1 0 00-1 1v.038a1 1 0 001 .962h9a1 1 0 001-.962V3.5a1 1 0 00-1-1h-9z"/></svg></button>
        <button id="btn-volume" title="Volume">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" id="volume-icon"><path d="M9.741.85a.75.75 0 01.375.65v13a.75.75 0 01-1.125.65l-6.925-4a3.642 3.642 0 01-1.33-4.967 3.639 3.639 0 011.33-1.332l6.925-4a.75.75 0 01.75 0zm-6.924 5.3a2.139 2.139 0 000 3.7l5.683 3.29V2.86L2.817 6.15z"/><path d="M11.5 4.75a.75.75 0 01.75-.75 3.5 3.5 0 010 7 .75.75 0 010-1.5 2 2 0 000-4 .75.75 0 01-.75-.75z"/><path d="M13 .75a.75.75 0 01.75-.75A5.75 5.75 0 0119.5 5.75v4.5A5.75 5.75 0 0113.75 16a.75.75 0 010-1.5 4.25 4.25 0 004.25-4.25v-4.5A4.25 4.25 0 0013.75 1.5.75.75 0 0113 .75z"/></svg>
        </button>
        <div class="volume-bar-container" id="volume-bar">
          <div class="volume-bar-fill" id="volume-fill" style="width:70%">
            <div class="volume-bar-thumb"></div>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <audio id="audio-player" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
